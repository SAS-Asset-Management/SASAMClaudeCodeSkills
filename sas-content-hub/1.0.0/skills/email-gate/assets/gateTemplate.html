  .sas-dl-gate .dl-submit {

    background-color: #69BE28 !important;

    transition: background-color 0.2s, transform 0.1s;

  @keyframes sas-dl-spin {
    to { transform: rotate(360deg); }

  /* ── API error message ── */
  .sas-dl-gate .dl-api-error {

  /* ── Success state ── */

  .sas-dl-gate .dl-success.visible {

    justify-content: center;
  }

  .sas-dl-gate .dl-success-icon svg {

  .sas-dl-gate .dl-success h4 {

  .sas-dl-gate .dl-success p {

    padding: 12px 28px;
    font-size: 16px;
    font-weight: 600;
    font-family: inherit;
    color: #ffffff !important;
    background-color: #69BE28 !important;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    text-decoration: none !important;
    transition: background-color 0.2s;
    -webkit-appearance: none;
    appearance: none;
  }

  .sas-dl-gate .dl-download-btn:hover {
    background-color: #5AA822 !important;
    color: #ffffff !important;
    text-decoration: none !important;
  }

  .sas-dl-gate .dl-download-btn:visited {

  .sas-dl-gate .dl-download-btn svg {

  /* ── Footer ── */

    padding: 12px 28px;

  .sas-dl-gate .dl-footer a {

  /* ── Reduced motion ── */

</style>

<div class="sas-dl-gate">
  <div class="dl-card">

    <!-- Header -->
    <div class="dl-header">
      <div class="dl-header-icon">
        <svg viewBox="0 0 24 24"><path d="{{GATE_ICON_SVG}}"/></svg>
      </div>
      <h3>{{GATE_TITLE}}</h3>
      <p>{{GATE_SUBTITLE}}</p>
    </div>

    <!-- Form -->
    <div class="dl-body" id="sas-dl-form-wrap">
      <form id="sas-dl-form" novalidate>
        <div class="dl-field">
          <label for="sas-dl-name">Full Name <span class="req">*</span></label>
          <input type="text" id="sas-dl-name" placeholder="e.g. Jane Smith" required autocomplete="name">
          <div class="dl-error-msg" id="sas-dl-name-err">Please enter your name.</div>
        </div>

        <div class="dl-field">
          <label for="sas-dl-role">Role / Title <span class="req">*</span></label>
          <input type="text" id="sas-dl-role" placeholder="e.g. Maintenance Manager" required>
          <div class="dl-error-msg" id="sas-dl-role-err">Please enter your role.</div>
        </div>

        <div class="dl-field">
          <label for="sas-dl-email">Work Email <span class="req">*</span></label>
          <input type="email" id="sas-dl-email" placeholder="e.g. jane.smith@company.com" required autocomplete="email">
          <div class="dl-error-msg" id="sas-dl-email-err">Please enter a valid email address.</div>
        </div>

        <!-- Cloudflare Turnstile (invisible/managed challenge) -->
        <div class="dl-turnstile">
          <div class="cf-turnstile" data-sitekey="{{TURNSTILE_SITEKEY}}"></div>
        </div>

        <!-- API error -->
        <div class="dl-api-error" id="sas-dl-api-err"></div>

        <button type="submit" class="dl-submit" id="sas-dl-submit">
          <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
          {{BUTTON_TEXT}}
        </button>
      </form>
    </div>

    <!-- Success (hidden until submit) -->
    <div class="dl-success" id="sas-dl-success">
      <div class="dl-success-icon">
        <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg>
      </div>
      <h4>{{SUCCESS_TITLE}}</h4>
      <p>{{SUCCESS_MESSAGE}}</p>
      <a class="dl-download-btn" id="sas-dl-link" href="#" target="_blank">
        <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
        {{DOWNLOAD_BUTTON_TEXT}}
      </a>
    </div>

    <!-- Footer -->
    <div class="dl-footer">
      Your information is handled in accordance with our <a href="/privacy" target="_blank">privacy policy</a>.
    </div>

  </div>
</div>

<script>
(function() {
  'use strict';

  // ═══════════════════════════════════════════════════════════
  //  CONFIGURATION
  // ═══════════════════════════════════════════════════════════
  var API_BASE = '{{API_BASE}}';
  var RESOURCE = '{{RESOURCE_SLUG}}';
  // ═══════════════════════════════════════════════════════════

  var form      = document.getElementById('sas-dl-form');
  var formWrap  = document.getElementById('sas-dl-form-wrap');
  var success   = document.getElementById('sas-dl-success');
  var dlLink    = document.getElementById('sas-dl-link');
  var btnSubmit = document.getElementById('sas-dl-submit');
  var apiErr    = document.getElementById('sas-dl-api-err');

  var fields = {
    name:  { input: document.getElementById('sas-dl-name'),  err: document.getElementById('sas-dl-name-err') },
    role:  { input: document.getElementById('sas-dl-role'),  err: document.getElementById('sas-dl-role-err') },
    email: { input: document.getElementById('sas-dl-email'), err: document.getElementById('sas-dl-email-err') },
  };

  // Clear errors on input
  Object.keys(fields).forEach(function(key) {
    fields[key].input.addEventListener('input', function() {
      this.classList.remove('dl-error');
      fields[key].err.classList.remove('visible');
      apiErr.classList.remove('visible');
    });
  });

  function isValidEmail(email) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
  }

  function validate() {
    var valid = true;

    if (!fields.name.input.value.trim()) {
      fields.name.input.classList.add('dl-error');
      fields.name.err.classList.add('visible');
      valid = false;
    }
    if (!fields.role.input.value.trim()) {
      fields.role.input.classList.add('dl-error');
      fields.role.err.classList.add('visible');
      valid = false;
    }
    if (!fields.email.input.value.trim() || !isValidEmail(fields.email.input.value.trim())) {
      fields.email.input.classList.add('dl-error');
      fields.email.err.classList.add('visible');
      valid = false;
    }

    return valid;
  }

  function showApiError(msg) {
    apiErr.textContent = msg;
    apiErr.classList.add('visible');
  }

  function resetButton() {
    btnSubmit.disabled = false;
    btnSubmit.innerHTML = '<svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg> {{BUTTON_TEXT}}';
  }

  form.addEventListener('submit', function(e) {
    e.preventDefault();
    apiErr.classList.remove('visible');

    if (!validate()) return;

    // Get Turnstile token
    var tokenEl = form.querySelector('[name=cf-turnstile-response]');
    var token = tokenEl ? tokenEl.value : '';
    if (!token) {
      showApiError('Please complete the security check. If you don\'t see it, try refreshing the page.');
      return;
    }

    // Disable button & show spinner
    btnSubmit.disabled = true;
    btnSubmit.innerHTML = '<span class="dl-spinner"></span> Sending\u2026';

    var payload = {
      name:            fields.name.input.value.trim(),
      role:            fields.role.input.value.trim(),
      email:           fields.email.input.value.trim(),
      company:         '',
      resource:        RESOURCE,
      source:          'webflow-gate',
      turnstile_token: token
    };

    fetch(API_BASE + '/gate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    })
    .then(function(resp) {
      if (!resp.ok) {
        return resp.json().then(function(err) {
          throw new Error(err.detail || 'Something went wrong. Please try again.');
        });
      }
      return resp.json();
    })
    .then(function(data) {
      // data.download_url is a relative path like /download/{token}
      dlLink.href = API_BASE + data.download_url;

      // Show success
      formWrap.style.display = 'none';
      success.classList.add('visible');
    })
    .catch(function(err) {
      showApiError(err.message || 'Something went wrong. Please try again.');
      resetButton();

      // Reset Turnstile so they can retry
      if (window.turnstile) {
        window.turnstile.reset();
      }
    });
  });
})();
</script>
